name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      WANDB_MODE: disabled  # never touch W&B from CI (use_wandb defaults to True)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true  # cache the uv download cache -> fast repeat installs
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy  # strict, zero type-ignores; targets configured in pyproject.toml
      - run: uv run pytest --cov --cov-report=term-missing
      # Render the coverage table into the run's job summary. Never gates the
      # build (no --cov-fail-under); reads the .coverage file pytest just wrote.
      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
